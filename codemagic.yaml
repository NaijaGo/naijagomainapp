      - name: Run tests
        script: |
          flutter test

      - name: Setup signing
        script: |
          xcode-project use-profiles

      # 🔥 IMPORTANT: build IPA using Flutter (most stable with Codemagic)
      - name: Build IPA
        script: |
          flutter build ipa --release --export-method app-store

      # 🔥 FORCE IPA DISCOVERY (fix your “No artifacts found” issue)
      - name: Locate IPA
        script: |
          echo "Searching for IPA..."
          find build -name "*.ipa" || true

      - name: Copy IPA to artifacts folder
        script: |
          mkdir -p build/ios/ipa
          find build -name "*.ipa" -exec cp {} build/ios/ipa/ \; || true
          ls -la build/ios/ipa || true

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
