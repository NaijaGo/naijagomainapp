workflows:
  ios-release:
    name: iOS Release

    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: naijago_mainapp_key

    environment:
      flutter: 3.32.8
      xcode: latest
      cocoapods: default

      vars:
        BUNDLE_ID: com.naijago.naijaGo

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.naijago.naijaGo

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Clean project
        script: |
          flutter clean
          flutter pub get

      - name: Install iOS pods
        script: |
          ruby --version
          pod --version
          cd ios
          pod install --repo-update
          cd ..

      - name: Setup signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release --export-method app-store

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - ojemenosesdestiny@gmail.com

        notify:
          success: true
          failure: true
