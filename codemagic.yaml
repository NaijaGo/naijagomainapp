workflows:
  ios-release:
    name: iOS Release

    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: naijago_mainapp_key

    environment:
      flutter: 3.32.8
      xcode: latest
      cocoapods: default

      vars:
        BUNDLE_ID: com.naijago.naijaGo
        FLUTTERWAVE_TEST_MODE: "false"
        FLUTTERWAVE_REDIRECT_URL: "https://naijago.com/payment-redirect"

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.naijago.naijaGo

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Clean project
        script: |
          flutter clean
          flutter pub get

      - name: Install iOS pods
        script: |
          ruby --version
          pod --version
          cd ios
          pod install --repo-update
          cd ..

      - name: Setup signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          if [ -z "$FLUTTERWAVE_PUBLIC_KEY" ]; then
            echo "Missing FLUTTERWAVE_PUBLIC_KEY. Add it to Codemagic environment variables before building."
            exit 1
          fi

          flutter build ipa --release --export-method app-store \
            --dart-define=FLUTTERWAVE_PUBLIC_KEY="$FLUTTERWAVE_PUBLIC_KEY" \
            --dart-define=FLUTTERWAVE_TEST_MODE="$FLUTTERWAVE_TEST_MODE" \
            --dart-define=FLUTTERWAVE_REDIRECT_URL="$FLUTTERWAVE_REDIRECT_URL"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - ojemenosesdestiny@gmail.com

        notify:
          success: true
          failure: true
