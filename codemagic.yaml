workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.32.8
      vars:
        PACKAGE_NAME: "com.naijago.naija_go"
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Analyze
        script: |
          flutter analyze
      - name: Run tests
        script: |
          flutter test
      - name: Configure Android signing
        script: |
          if [ -n "$CM_KEYSTORE" ]; then
            echo "$CM_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/android/app/upload-keystore.jks"
            {
              printf "%s\n" "storePassword=$CM_KEYSTORE_PASSWORD"
              printf "%s\n" "keyPassword=$CM_KEY_PASSWORD"
              printf "%s\n" "keyAlias=$CM_KEY_ALIAS"
              printf "%s\n" "storeFile=app/upload-keystore.jks"
            } > "$CM_BUILD_DIR/android/key.properties"
          else
            echo "CM_KEYSTORE is not set. Building without a release signing config."
          fi
      - name: Build Android artifacts
        script: |
          flutter build apk --release
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab

  ios-no-codesign:
    name: iOS No Codesign
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.32.8
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod install
      - name: Analyze
        script: |
          flutter analyze
      - name: Run tests
        script: |
          flutter test
      - name: Build iOS without codesigning
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
